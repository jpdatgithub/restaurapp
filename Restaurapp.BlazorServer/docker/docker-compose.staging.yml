services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurapp-postgres-staging
    restart: unless-stopped
    env_file:
      - ../.env.staging
    ports:
      - "5433:5432"
    volumes:
      - restaurapp-pgdata-staging:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  migration:
    image: restaurapp/blazorserver:${IMAGE_TAG}
    container_name: restaurapp-migration-staging
    env_file:
      - ../.env.staging
    depends_on:
      postgres:
        condition: service_healthy
    command: [ "dotnet", "Restaurapp.BlazorServer.dll", "migrate" ]

  restaurapp-server:
    image: restaurapp/blazorserver:${IMAGE_TAG}
    container_name: restaurapp-server-staging
    restart: unless-stopped
    env_file:
      - ../.env.staging
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      Uploads__RootPath: /data/uploads
      ForwardedHeaders__TrustAll: "true"
    ports:
      - "5002:8080"
    volumes:
      - /var/www/restaurapp/uploads-staging:/data/uploads
      - /var/log/restaurapp/staging:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  restaurapp-pgdata-staging:
