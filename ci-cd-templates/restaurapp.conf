map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ========================
# PRODUÇÃO (app cliente)
# ========================
server {
    listen 80;
    server_name restaurapp.servti.com.br;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ========================
# STAGING (app cliente)
# ========================
server {
    listen 80;
    server_name restaurapp-staging.servti.com.br;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ========================
# PRODUÇÃO (empresa)
# ========================
server {
    listen 80;
    server_name restaurappempresa.servti.com.br;

    client_max_body_size 6m;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ========================
# STAGING (empresa)
# ========================
server {
    listen 80;
    server_name restaurappempresa-staging.servti.com.br;

    client_max_body_size 6m;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ========================
# REDIRECT WWW → SEM WWW
# ========================
server {
    listen 80;
    server_name www.restaurappempresa-staging.servti.com.br;

    return 301 http://restaurappempresa-staging.servti.com.br$request_uri;
}

# ========================
# STAGING (empresa) - SSL (https)
# ========================
server {
    listen 443 ssl;
    server_name restaurappempresa-staging.servti.com.br;

    ssl_certificate /etc/letsencrypt/live/restaurappempresa-staging.servti.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restaurappempresa-staging.servti.com.br/privkey.pem;

    client_max_body_size 6m;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}